          ctx.rotate(Math.PI * 0.25);
          roundedRectPath(ctx, -10, -10, 20, 20, 4);
          ctx.fillStyle = gemGradient;
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.58)";
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 255, 255, 0.36)";
          roundedRectPath(ctx, -4, -8, 6, 10, 2);
          ctx.fill();

          ctx.restore();
        }
      }

      drawBoosters(ctx) {
        for (const booster of this.state.boosters) {
          const y = booster.y + Math.sin(booster.float) * 10;

          ctx.save();
          ctx.translate(booster.x, y);
          ctx.rotate(booster.spin);

          const aura = ctx.createRadialGradient(0, 0, 2, 0, 0, 24);
          aura.addColorStop(0, "rgba(255, 236, 147, 0.54)");
          aura.addColorStop(1, "rgba(255, 236, 147, 0)");
          ctx.fillStyle = aura;
          ctx.beginPath();
          ctx.arc(0, 0, 24, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#ffe47a";
          roundedRectPath(ctx, -11, -11, 22, 22, 6);
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
          ctx.stroke();

          ctx.strokeStyle = "rgba(255, 255, 255, 0.96)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, -8);
          ctx.lineTo(0, 8);
          ctx.moveTo(-8, 0);
          ctx.lineTo(8, 0);
          ctx.stroke();

          ctx.restore();
        }
      }

      drawPipeSegment(ctx, x, y, width, height, topPipe) {
        if (height <= 0) {
          return;
        }

        const bodyGradient = ctx.createLinearGradient(x, y, x + width, y);
        bodyGradient.addColorStop(0, "#5f8c75");
        bodyGradient.addColorStop(0.5, "#7ca68b");
        bodyGradient.addColorStop(1, "#547b66");

        ctx.save();
        roundedRectPath(ctx, x, y, width, height, 18);
        ctx.fillStyle = bodyGradient;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
        roundedRectPath(ctx, x + 12, y + 10, 10, Math.max(26, height - 20), 6);
        ctx.fill();

        const capHeight = 22;
        const capY = topPipe ? y + height - capHeight : y;
        roundedRectPath(ctx, x - 6, capY, width + 12, capHeight, 12);
        ctx.fillStyle = "#88b29a";
        ctx.fill();
        ctx.strokeStyle = "rgba(47, 75, 62, 0.28)";
        ctx.stroke();
        ctx.restore();
      }

      drawParticles(ctx) {
        if (this.reducedMotion) {
          return;
        }

        for (const particle of this.state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color.replace(/[\d.]+\)$/u, `${alpha})`);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      drawBird(ctx) {
        const bird = this.state.bird;
        const wingLift = Math.sin(bird.wingPhase) * 0.65;
        const palette = this.getSelectedPalette();

        ctx.save();
        ctx.translate(bird.x, bird.y);

        ctx.fillStyle = "rgba(37, 54, 81, 0.12)";
        ctx.beginPath();
        ctx.ellipse(0, 26, 20, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.rotate(bird.rotation);

        ctx.fillStyle = palette.belly;
        ctx.beginPath();
        ctx.ellipse(-4, 3, 18, 16, 0, 0, Math.PI * 2);
        ctx.fill();

        const bodyGradient = ctx.createLinearGradient(-18, -16, 20, 18);
        bodyGradient.addColorStop(0, palette.belly);
        bodyGradient.addColorStop(0.4, palette.body);
        bodyGradient.addColorStop(1, palette.wing);
        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 18, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(7, -5, 6.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#1e293d";
        ctx.beginPath();
        ctx.arc(8.8, -4.8, 2.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = palette.beak;
        ctx.beginPath();
        ctx.moveTo(17, 1);
        ctx.lineTo(30, 5);
        ctx.lineTo(17, 10);
        ctx.closePath();
        ctx.fill();

        ctx.save();
        ctx.translate(-5, 4 + wingLift * 3);
        ctx.rotate(-0.65 + wingLift * 0.3);
        ctx.fillStyle = palette.wing;
        ctx.beginPath();
        ctx.ellipse(0, 0, 14, 8, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (palette.id === "peony") {
          ctx.fillStyle = palette.shimmerB || "rgba(255, 232, 245, 0.82)";
          ctx.beginPath();
          ctx.ellipse(-2, -7, 8, 4.8, -0.35, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = palette.shimmerA || "rgba(255, 255, 255, 0.9)";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(8, -14);
          ctx.lineTo(11, -10);
          ctx.moveTo(11, -14);
          ctx.lineTo(8, -10);
          ctx.stroke();
        }

        ctx.strokeStyle = palette.accent;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0.6, 4.8);
        ctx.stroke();

        ctx.restore();
      }

      drawGround(ctx) {
        const fieldWidth = this.playfield.width;
        const top = this.core.y + GAME_HEIGHT - GROUND_HEIGHT;
        const stripeOffset = ((this.state.groundOffset % 36) + 36) % 36;
        const groundGradient = ctx.createLinearGradient(0, top, 0, top + GROUND_HEIGHT);
        groundGradient.addColorStop(0, "#f4e8cc");
        groundGradient.addColorStop(1, "#ead7b4");

        ctx.fillStyle = groundGradient;
        ctx.fillRect(0, top, fieldWidth, GROUND_HEIGHT);

        ctx.fillStyle = "#7ca489";
        ctx.fillRect(0, top, fieldWidth, 8);

        ctx.fillStyle = "rgba(255, 255, 255, 0.16)";
        ctx.fillRect(0, top + 8, fieldWidth, 6);

        ctx.strokeStyle = "rgba(165, 132, 83, 0.25)";
        ctx.lineWidth = 6;

        for (let x = -36 + stripeOffset; x < fieldWidth + 40; x += 36) {
          ctx.beginPath();
          ctx.moveTo(x, top + 26);
          ctx.lineTo(x + 16, top + 44);
          ctx.stroke();
        }
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      new FlappyBirdGame();
    });
  </script>
</body>
</html>
