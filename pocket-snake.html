<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Snake</title>
  <style>
    :root {
      --bg: #0f1510;
      --panel: rgba(18, 26, 19, 0.92);
      --panel-soft: rgba(24, 33, 25, 0.9);
      --line: rgba(137, 196, 123, 0.14);
      --text: #eef7ee;
      --muted: #a7bbab;
      --snake-head: #7ee081;
      --snake-body: #56b86a;
      --snake-link: #67c978;
      --food: #98f0a3;
      --accent: #dff7d8;
      --accent-strong: #7ee081;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(126, 224, 129, 0.12), transparent 34%),
        linear-gradient(180deg, #0d140f 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .app {
      width: min(100%, 520px);
      display: grid;
      gap: 14px;
    }

    .topbar,
    .panel,
    .dpad button {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-areas: "title stats actions";
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 22px;
      position: relative;
    }

    .title {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      grid-area: title;
    }

    .stats {
      display: flex;
      gap: 8px;
      justify-content: center;
      min-width: 0;
      justify-self: center;
      grid-area: stats;
      width: 100%;
    }

    .stat {
      min-width: 92px;
      padding: 9px 12px 10px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(29, 41, 30, 0.95), rgba(22, 31, 23, 0.95));
      border: 1px solid rgba(137, 196, 123, 0.1);
      text-align: center;
    }

    .stats span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stats strong {
      color: var(--text);
      font-weight: 700;
      font-size: 1.2rem;
    }

    .icon-button {
      width: 44px;
      min-width: 44px;
      aspect-ratio: 1 / 1;
      flex-shrink: 0;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 1.15rem;
      line-height: 1;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(36, 49, 37, 0.98), rgba(24, 34, 25, 0.98));
      justify-self: end;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      grid-area: actions;
    }

    .board {
      position: relative;
      border: 1px solid var(--line);
      background: #141b15;
      overflow: hidden;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(180deg, #172018 0%, #121912 100%);
      background-size: 5% 5%;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(10, 16, 11, 0.72);
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-box {
      max-width: 320px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid rgba(137, 196, 123, 0.14);
      background: rgba(20, 29, 21, 0.9);
    }

    .overlay-box h2 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .overlay-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .overlay-box p:empty {
      display: none;
    }

    .overlay-actions {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    button,
    input[type="range"] {
      appearance: none;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(28, 38, 29, 0.95);
      color: var(--text);
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
      min-height: 44px;
      border-radius: 14px;
      transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:hover {
      background: rgba(38, 53, 39, 0.98);
      border-color: rgba(137, 196, 123, 0.28);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent-strong), #a6ef9f);
      color: #0d140f;
      border-color: transparent;
      font-weight: 700;
    }

    .settings-controls {
      display: grid;
      grid-template-columns: 92px minmax(164px, 1fr);
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .sound {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
      min-width: 0;
      height: 40px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(24, 33, 25, 0.96);
      border: 1px solid rgba(137, 196, 123, 0.12);
    }

    .sound input[type="range"] {
      flex: 1 1 auto;
      min-width: 140px;
      width: 100%;
      height: 4px;
      background: rgba(167, 187, 171, 0.25);
      outline: none;
      border-radius: 999px;
      touch-action: pan-x;
      pointer-events: auto;
    }

    .sound input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 0;
      background: var(--accent-strong);
      cursor: pointer;
    }

    .sound input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 0;
      background: var(--accent-strong);
      cursor: pointer;
    }

    .settings-popover {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      width: min(320px, calc(100vw - 32px));
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(137, 196, 123, 0.16);
      background: linear-gradient(180deg, rgba(25, 36, 26, 0.98), rgba(18, 26, 19, 0.98));
      box-shadow: 0 26px 60px rgba(0, 0, 0, 0.34);
      display: grid;
      gap: 0;
      opacity: 0;
      transform: translateY(-8px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 5;
      backdrop-filter: blur(12px);
    }

    .settings-popover.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .settings-row {
      min-width: 0;
    }

    #mute-button {
      width: 92px;
      min-height: 40px;
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .dpad {
      display: none;
      grid-template-columns: repeat(3, 64px);
      grid-template-rows: repeat(3, 64px);
      gap: 10px;
      justify-content: center;
    }

    .dpad button {
      width: 64px;
      height: 64px;
      padding: 0;
      font-size: 1.2rem;
      font-weight: 700;
      background: rgba(28, 38, 29, 0.95);
      border-radius: 18px;
    }

    .up {
      grid-column: 2;
      grid-row: 1;
    }

    .left {
      grid-column: 1;
      grid-row: 2;
    }

    .right {
      grid-column: 3;
      grid-row: 2;
    }

    .down {
      grid-column: 2;
      grid-row: 3;
    }

    @media (max-width: 700px), (pointer: coarse) {
      body {
        padding: 12px;
      }

      .app {
        gap: 12px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "title actions"
          "stats stats";
        gap: 10px;
        padding: 10px 12px;
        border-radius: 20px;
      }

      .title {
        font-size: 0.82rem;
        letter-spacing: 0.12em;
      }

      .stats {
        width: 100%;
        justify-content: stretch;
        gap: 8px;
        justify-self: stretch;
      }

      .stat {
        flex: 1 1 0;
        min-width: 0;
        padding: 8px 10px 9px;
        border-radius: 14px;
      }

      .stats span {
        font-size: 0.66rem;
      }

      .stats strong {
        font-size: 1.05rem;
      }

      .topbar-actions {
        justify-content: flex-end;
      }

      .icon-button {
        width: 40px;
        min-width: 40px;
        height: 40px;
        min-height: 40px;
        font-size: 1rem;
      }

      .dpad {
        display: grid;
      }

      .settings-popover {
        width: min(300px, calc(100vw - 24px));
        right: 0;
        left: auto;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 8px;
      }

      .app {
        gap: 10px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "title actions"
          "stats stats";
        gap: 8px;
        padding: 9px 10px;
        border-radius: 18px;
      }

      .title {
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        min-width: 0;
      }

      .stats {
        width: 100%;
        justify-content: stretch;
        gap: 5px;
        justify-self: stretch;
      }

      .stat {
        min-width: 0;
        flex: 1 1 0;
        padding: 6px 7px 7px;
        border-radius: 12px;
      }

      .stats span {
        font-size: 0.58rem;
        margin-bottom: 3px;
      }

      .stats strong {
        font-size: 0.92rem;
      }

      .icon-button {
        width: 36px;
        min-width: 36px;
        height: 36px;
        min-height: 36px;
        font-size: 0.92rem;
      }

      .settings-popover {
        width: min(252px, calc(100vw - 16px));
        left: auto;
        right: 0;
        top: calc(100% + 8px);
        padding: 10px;
        border-radius: 16px;
      }

      .settings-controls {
        grid-template-columns: 72px minmax(120px, 1fr);
        gap: 8px;
      }

      #mute-button {
        width: 72px;
        min-height: 36px;
        padding: 8px 9px;
        font-size: 0.8rem;
      }

      .sound {
        height: 36px;
        padding: 0 9px;
      }

      .sound input[type="range"] {
        min-width: 84px;
      }

      .board {
        border-radius: 20px;
      }

      .overlay-box {
        padding: 16px 16px;
        border-radius: 18px;
      }

      .overlay-box h2 {
        font-size: 1.2rem;
        margin-bottom: 8px;
      }

      .dpad {
        gap: 8px;
        grid-template-columns: repeat(3, 58px);
        grid-template-rows: repeat(3, 58px);
      }

      .dpad button {
        width: 58px;
        height: 58px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <h1 class="title">Snake Game</h1>
      <div class="stats">
        <div class="stat"><span>Score</span> <strong id="score">0</strong></div>
        <div class="stat"><span>Best</span> <strong id="best">0</strong></div>
      </div>
      <div class="topbar-actions">
        <button id="settings-button" class="icon-button" type="button" aria-label="Settings">⚙</button>
      </div>
      <div id="settings-panel" class="settings-popover">
        <div class="settings-controls">
          <button id="mute-button" type="button">Sound</button>
          <div class="sound">
            <input id="volume" type="range" min="0" max="100" value="40" aria-label="Volume">
          </div>
        </div>
      </div>
    </section>

    <section class="board">
      <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-box">
          <h2 id="overlay-title">Snake Game</h2>
          <p id="overlay-text"></p>
          <div class="overlay-actions">
            <button id="overlay-action" class="primary" type="button">Start</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel dpad" aria-label="Mobile controls">
      <button class="up" type="button" data-dir="up">▲</button>
      <button class="left" type="button" data-dir="left">◀</button>
      <button class="right" type="button" data-dir="right">▶</button>
      <button class="down" type="button" data-dir="down">▼</button>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const overlayText = document.getElementById("overlay-text");
    const overlayActionButton = document.getElementById("overlay-action");
    const settingsButton = document.getElementById("settings-button");
    const settingsPanel = document.getElementById("settings-panel");
    const muteButton = document.getElementById("mute-button");
    const volumeSlider = document.getElementById("volume");
    const dpad = document.querySelector(".dpad");

    const tileCount = 20;
    const canvasSize = canvas.width;
    const cellSize = canvasSize / tileCount;
    const startStepMs = 165;
    const minStepMs = 115;
    const speedRampLength = 28;
    const swipeThreshold = 24;
    const maxInterpolation = 0.48;

    const storageKeys = {
      best: "snake-minimal-best",
      volume: "snake-minimal-volume",
      muted: "snake-minimal-muted"
    };

    let snake = [];
    let previousSnake = [];
    let direction = { x: 1, y: 0 };
    let directionQueue = [];
    let food = { x: 0, y: 0 };
    let score = 0;
    let bestScore = Number(localStorage.getItem(storageKeys.best) || 0);
    let running = false;
    let paused = false;
    let animationFrame = 0;
    let lastTime = 0;
    let accumulator = 0;
    let touchStart = null;
    let audioContext = null;
    let volume = Number(localStorage.getItem(storageKeys.volume) || 0.4);
    let muted = localStorage.getItem(storageKeys.muted) === "true";

    bestEl.textContent = String(bestScore);
    volumeSlider.value = String(Math.round(volume * 100));

    function updateMuteButton() {
      muteButton.textContent = muted ? "Sound: off" : "Sound: on";
    }

    function closeSettings() {
      settingsPanel.classList.remove("open");
      settingsButton.textContent = "⚙";
    }

    function showOverlay(title, text) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlay.classList.remove("hidden");
    }

    function hideOverlay() {
      overlay.classList.add("hidden");
    }

    function updateScore() {
      scoreEl.textContent = String(score);
      if (score > bestScore) {
        bestScore = score;
        bestEl.textContent = String(bestScore);
        localStorage.setItem(storageKeys.best, String(bestScore));
      }
    }

    function resetState() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      previousSnake = snake.map(segment => ({ ...segment }));
      direction = { x: 1, y: 0 };
      directionQueue = [];
      score = 0;
      updateScore();
      placeFood();
    }

    function placeFood() {
      const occupied = new Set(snake.map(segment => `${segment.x},${segment.y}`));
      const freeCells = [];

      for (let y = 0; y < tileCount; y += 1) {
        for (let x = 0; x < tileCount; x += 1) {
          const key = `${x},${y}`;
          if (!occupied.has(key)) {
            freeCells.push({ x, y });
          }
        }
      }

      if (freeCells.length === 0) {
        finishGame(true);
        return;
      }

      food = freeCells[Math.floor(Math.random() * freeCells.length)];
    }

    function ensureAudioContext() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return null;
        }
        audioContext = new AudioContextClass();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }

      return audioContext;
    }

    function playTone(type, frequency, duration, gainValue) {
      if (muted || volume <= 0) {
        return;
      }

      const context = ensureAudioContext();
      if (!context) {
        return;
      }

      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const now = context.currentTime;
      const loudness = Math.max(0.001, Math.min(1, gainValue * volume));

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(loudness, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.03);
    }

    function playEatSound() {
      playTone("square", 520, 0.08, 0.08);
      setTimeout(() => playTone("square", 700, 0.07, 0.05), 35);
    }

    function playCrashSound() {
      playTone("sawtooth", 180, 0.16, 0.08);
      setTimeout(() => playTone("triangle", 110, 0.2, 0.06), 55);
    }

    function queueDirection(nextX, nextY) {
      const lastQueuedDirection = directionQueue[directionQueue.length - 1] || direction;
      const sameDirection = lastQueuedDirection.x === nextX && lastQueuedDirection.y === nextY;
      const reversing = lastQueuedDirection.x === -nextX && lastQueuedDirection.y === -nextY;

      if (sameDirection || reversing || directionQueue.length >= 2) {
        return;
      }

      directionQueue.push({ x: nextX, y: nextY });
    }

    function handleDirectionInput(name) {
      if (!running || paused) {
        return;
      }

      if (name === "up") {
        queueDirection(0, -1);
      } else if (name === "down") {
        queueDirection(0, 1);
      } else if (name === "left") {
        queueDirection(-1, 0);
      } else if (name === "right") {
        queueDirection(1, 0);
      }
    }

    function getCurrentStepMs() {
      const progress = Math.min(1, Math.max(0, (snake.length - 3) / speedRampLength));
      return startStepMs - ((startStepMs - minStepMs) * progress);
    }

    function drawCell(x, y, color, padding) {
      const px = x * cellSize + padding;
      const py = y * cellSize + padding;
      const size = cellSize - padding * 2;
      const radius = Math.max(4, size * 0.2);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(px, py, size, size, radius);
      ctx.fill();
    }

    function drawApple(x, y) {
      const centerX = x * cellSize + (cellSize / 2);
      const centerY = y * cellSize + (cellSize / 2);
      const radius = cellSize * 0.26;

      ctx.fillStyle = "#f05a5a";
      ctx.beginPath();
      ctx.arc(centerX - radius * 0.45, centerY + radius * 0.02, radius, 0, Math.PI * 2);
      ctx.arc(centerX + radius * 0.45, centerY + radius * 0.02, radius, 0, Math.PI * 2);
      ctx.arc(centerX, centerY + radius * 0.28, radius * 0.95, 0, Math.PI);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "#6b4b2a";
      ctx.lineWidth = Math.max(2, cellSize * 0.05);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(centerX, centerY - radius * 1.2);
      ctx.lineTo(centerX + radius * 0.1, centerY - radius * 1.75);
      ctx.stroke();

      ctx.fillStyle = "#7ed36a";
      ctx.beginPath();
      ctx.ellipse(
        centerX + radius * 0.62,
        centerY - radius * 1.05,
        radius * 0.5,
        radius * 0.26,
        -0.55,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function drawSegmentConnector(fromX, fromY, toX, toY, color, padding) {
      const centerOffset = cellSize / 2;
      const fromCenterX = fromX * cellSize + centerOffset;
      const fromCenterY = fromY * cellSize + centerOffset;
      const toCenterX = toX * cellSize + centerOffset;
      const toCenterY = toY * cellSize + centerOffset;
      const dx = toCenterX - fromCenterX;
      const dy = toCenterY - fromCenterY;
      const distance = Math.hypot(dx, dy);

      if (distance < 1) {
        return;
      }

      const unitX = dx / distance;
      const unitY = dy / distance;
      const inset = Math.max(1, cellSize * 0.08);
      const startX = fromCenterX + unitX * inset;
      const startY = fromCenterY + unitY * inset;
      const endX = toCenterX - unitX * inset;
      const endY = toCenterY - unitY * inset;
      const thickness = Math.max(6, cellSize - padding * 2 - 8);

      ctx.strokeStyle = color;
      ctx.lineWidth = thickness;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
    }

    function drawHeadDetails(headX, headY) {
      const centerX = headX * cellSize + (cellSize / 2);
      const centerY = headY * cellSize + (cellSize / 2);
      const eyeOffsetSide = cellSize * 0.16;
      const eyeOffsetFront = cellSize * 0.13;
      const eyeRadius = Math.max(2, cellSize * 0.07);
      const tongueLength = cellSize * 0.2;
      const tongueSpread = cellSize * 0.08;

      let frontX = direction.x;
      let frontY = direction.y;

      if (frontX === 0 && frontY === 0) {
        frontX = 1;
      }

      const perpX = -frontY;
      const perpY = frontX;

      const leftEyeX = centerX + (frontX * eyeOffsetFront) + (perpX * eyeOffsetSide);
      const leftEyeY = centerY + (frontY * eyeOffsetFront) + (perpY * eyeOffsetSide);
      const rightEyeX = centerX + (frontX * eyeOffsetFront) - (perpX * eyeOffsetSide);
      const rightEyeY = centerY + (frontY * eyeOffsetFront) - (perpY * eyeOffsetSide);
      const tongueBaseX = centerX + (frontX * cellSize * 0.28);
      const tongueBaseY = centerY + (frontY * cellSize * 0.28);
      const tongueTipX = tongueBaseX + (frontX * tongueLength);
      const tongueTipY = tongueBaseY + (frontY * tongueLength);

      ctx.strokeStyle = "#e14b5a";
      ctx.lineWidth = Math.max(1.5, cellSize * 0.04);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(tongueBaseX, tongueBaseY);
      ctx.lineTo(tongueTipX, tongueTipY);
      ctx.moveTo(tongueTipX, tongueTipY);
      ctx.lineTo(tongueTipX - (frontX * tongueSpread) + (perpX * tongueSpread), tongueTipY - (frontY * tongueSpread) + (perpY * tongueSpread));
      ctx.moveTo(tongueTipX, tongueTipY);
      ctx.lineTo(tongueTipX - (frontX * tongueSpread) - (perpX * tongueSpread), tongueTipY - (frontY * tongueSpread) - (perpY * tongueSpread));
      ctx.stroke();

      ctx.fillStyle = "#111111";
      ctx.beginPath();
      ctx.arc(leftEyeX, leftEyeY, eyeRadius, 0, Math.PI * 2);
      ctx.arc(rightEyeX, rightEyeY, eyeRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    function render(interpolation = 1) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawApple(food.x, food.y);
      const renderedSegments = [];

      for (let i = snake.length - 1; i >= 0; i -= 1) {
        const current = snake[i];
        const fallback = snake[i + 1] || current;
        const previous = previousSnake[i] || fallback;
        const segmentInterpolation = i === 1
          ? Math.min(1, interpolation + 0.28)
          : interpolation;
        const x = i === 0
          ? current.x
          : previous.x + ((current.x - previous.x) * segmentInterpolation);
        const y = i === 0
          ? current.y
          : previous.y + ((current.y - previous.y) * segmentInterpolation);
        renderedSegments[i] = { x, y };
      }

      const headColor = getComputedStyle(document.documentElement).getPropertyValue("--snake-head").trim();
      const bodyColor = getComputedStyle(document.documentElement).getPropertyValue("--snake-body").trim();
      const linkColor = getComputedStyle(document.documentElement).getPropertyValue("--snake-link").trim();

      for (let i = 0; i < renderedSegments.length - 1; i += 1) {
        drawSegmentConnector(
          renderedSegments[i].x,
          renderedSegments[i].y,
          renderedSegments[i + 1].x,
          renderedSegments[i + 1].y,
          linkColor,
          3
        );
      }

      for (let i = snake.length - 1; i >= 0; i -= 1) {
        drawCell(renderedSegments[i].x, renderedSegments[i].y, i === 0 ? headColor : bodyColor, 3);
      }

      if (renderedSegments.length > 0) {
        drawHeadDetails(renderedSegments[0].x, renderedSegments[0].y);
      }
    }

    function finishGame(won) {
      running = false;
      paused = false;
      cancelAnimationFrame(animationFrame);
      closeSettings();
      overlayActionButton.textContent = "Restart";
      if (won) {
        playTone("triangle", 660, 0.12, 0.06);
        setTimeout(() => playTone("triangle", 880, 0.18, 0.05), 50);
      } else {
        playCrashSound();
      }
      showOverlay(
        won ? "You Win" : "Game Over",
        won
          ? `The board is full. Score: ${score}.`
          : `Score: ${score}.`
      );
    }

    function step() {
      previousSnake = snake.map(segment => ({ ...segment }));
      if (directionQueue.length > 0) {
        direction = directionQueue.shift();
      }
      const nextHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall =
        nextHead.x < 0 ||
        nextHead.y < 0 ||
        nextHead.x >= tileCount ||
        nextHead.y >= tileCount;

      const grows = nextHead.x === food.x && nextHead.y === food.y;
      const bodyToCheck = grows ? snake : snake.slice(0, -1);
      const hitSelf = bodyToCheck.some(segment => segment.x === nextHead.x && segment.y === nextHead.y);

      if (hitWall || hitSelf) {
        finishGame(false);
        return;
      }

      snake.unshift(nextHead);

      if (grows) {
        score += 10;
        updateScore();
        playEatSound();
        placeFood();
      } else {
        snake.pop();
      }

      render();
    }

    function frame(time) {
      if (!running) {
        return;
      }

      if (!lastTime) {
        lastTime = time;
      }

      const delta = time - lastTime;
      lastTime = time;
      const currentStepMs = getCurrentStepMs();

      if (!paused) {
        accumulator += delta;
        while (accumulator >= currentStepMs) {
          accumulator -= currentStepMs;
          step();
          if (!running) {
            return;
          }
        }
      }

      const rawInterpolation = Math.min(1, accumulator / currentStepMs);
      const visualInterpolation = paused
        ? 1
        : Math.min(maxInterpolation, rawInterpolation * maxInterpolation);

      render(visualInterpolation);

      animationFrame = requestAnimationFrame(frame);
    }

    function startGame() {
      ensureAudioContext();
      resetState();
      running = true;
      paused = false;
      accumulator = 0;
      lastTime = 0;
      closeSettings();
      hideOverlay();
      render(1);
      cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(frame);
    }

    function togglePause() {
      if (!running) {
        return;
      }

      paused = !paused;

      if (paused) {
        overlayActionButton.textContent = "Resume";
        showOverlay("Paused", "");
      } else {
        hideOverlay();
        accumulator = 0;
        lastTime = 0;
      }
    }

    function onKeyDown(event) {
      const key = event.key.toLowerCase();
      const movementKeys = ["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"];
      const startKeys = [...movementKeys, " ", "enter"];
      const pauseKeys = [" "];

      if (!running && startKeys.includes(key)) {
        event.preventDefault();
        startGame();
        return;
      }

      if (movementKeys.includes(key) || pauseKeys.includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        handleDirectionInput("up");
      } else if (key === "arrowdown" || key === "s") {
        handleDirectionInput("down");
      } else if (key === "arrowleft" || key === "a") {
        handleDirectionInput("left");
      } else if (key === "arrowright" || key === "d") {
        handleDirectionInput("right");
      } else if (pauseKeys.includes(key)) {
        togglePause();
      }
    }

    function onTouchStart(event) {
      const touch = event.changedTouches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
    }

    function onTouchEnd(event) {
      if (!touchStart) {
        return;
      }

      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      touchStart = null;

      if (Math.abs(dx) < swipeThreshold && Math.abs(dy) < swipeThreshold) {
        return;
      }

      if (Math.abs(dx) > Math.abs(dy)) {
        handleDirectionInput(dx > 0 ? "right" : "left");
      } else {
        handleDirectionInput(dy > 0 ? "down" : "up");
      }
    }

    function setVolume(nextVolume) {
      volume = Math.max(0, Math.min(1, nextVolume));
      localStorage.setItem(storageKeys.volume, String(volume));
    }

    overlayActionButton.addEventListener("click", () => {
      if (running && paused) {
        togglePause();
        return;
      }
      startGame();
    });
    canvas.addEventListener("click", () => {
      if (running && !paused) {
        togglePause();
      }
    });
    settingsButton.addEventListener("click", () => {
      settingsPanel.classList.toggle("open");
      settingsButton.textContent = settingsPanel.classList.contains("open") ? "✕" : "⚙";
    });
    muteButton.addEventListener("click", () => {
      muted = !muted;
      localStorage.setItem(storageKeys.muted, String(muted));
      updateMuteButton();
    });
    volumeSlider.addEventListener("input", () => {
      setVolume(Number(volumeSlider.value) / 100);
    });
    document.addEventListener("keydown", onKeyDown);
    canvas.addEventListener("touchstart", onTouchStart, { passive: true });
    canvas.addEventListener("touchend", onTouchEnd, { passive: true });
    dpad.addEventListener("click", event => {
      const button = event.target.closest("button[data-dir]");
      if (button) {
        handleDirectionInput(button.dataset.dir);
      }
    });
    document.addEventListener("click", event => {
      if (!settingsPanel.contains(event.target) && !settingsButton.contains(event.target)) {
        closeSettings();
      }
    });

    settingsButton.textContent = "⚙";
    updateMuteButton();
    resetState();
    render(1);
    overlayActionButton.textContent = "Start";
    showOverlay("Snake Game", "");
  </script>
</body>
</html>
