<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CsokiTech</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1220;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 48px;
    }

    p {
      margin: 0;
      font-size: 18px;
      color: #cbd5e1;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CsokiTech</h1>
    <p>Marton Dániel személyes portfólió oldala.<br>Hamarosan projektek és további tartalmak érkeznek.</p>
  </div>
</body>
</html>
